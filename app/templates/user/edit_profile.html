{% extends "base.html" %}
{% block title %}编辑资料{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header"><h5 class="mb-0">编辑个人资料</h5></div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-3 text-center">
                        {% if user.avatar %}
                        <img src="{{ url_for('static', filename=user.avatar) }}" class="rounded-circle mb-2" width="100" height="100" style="object-fit:cover">
                        {% endif %}
                        <div>
                            <label class="form-label">更换头像 (JPG/PNG/WebP, &lt;5MB)</label>
                            <input type="file" name="avatar" class="form-control" accept="image/jpeg,image/png,image/webp">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}" maxlength="30">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">个人简介</label>
                        <textarea name="introduction" class="form-control" rows="3" maxlength="500">{{ user.introduction or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="{{ url_for('user.profile') }}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

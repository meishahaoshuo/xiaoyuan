{% extends "base.html" %}
{% from "partials/_product_card.html" import product_card %}
{% block title %}我的收藏{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-heart text-danger"></i> 我的收藏</h4>
{% if products %}
<div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3">
    {% for p in products %}
    {{ product_card(p) }}
    {% endfor %}
</div>
{% else %}
<div class="text-center py-5 text-muted">
    <i class="bi bi-heart" style="font-size:3rem"></i>
    <p class="mt-2">还没有收藏任何商品</p>
    <a href="{{ url_for('browse.home') }}" class="btn btn-primary">去逛逛</a>
</div>
{% endif %}
{% endblock %}
